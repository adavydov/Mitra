name: L0 Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  l0-guard:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Check protected perimeter via GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const OVERRIDE_LABELS = new Set(['sovereign-override', 'l0-approved']);
            const PROTECTED_PREFIXES = ['governance/', '.github/workflows/'];

            const labels = (context.payload.pull_request?.labels ?? []).map((label) => label.name);
            const hasOverride = labels.some((name) => OVERRIDE_LABELS.has(name));

            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const touchedProtected = changedFiles
              .map((file) => file.filename)
              .filter((filename) => PROTECTED_PREFIXES.some((prefix) => filename.startsWith(prefix)));

            if (touchedProtected.length === 0) {
              core.info('No protected L0 perimeter files changed. Guard passed.');
              return;
            }

            core.warning(`Protected perimeter touched: ${touchedProtected.join(', ')}`);

            if (hasOverride) {
              core.info("Override label found (sovereign-override/l0-approved). Guard passed.");
              return;
            }

            core.setFailed(
              "Protected files were changed (governance/** or .github/workflows/**). " +
              "A sovereign override label is required: add 'sovereign-override' (or legacy 'l0-approved'). " +
              "This is a governance guard failure, not a test failure."
            );
