name: L0 Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  l0-guard:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: tj-actions/changed-files@v34
        id: changed

      - name: Check for protected files
        run: |
          PROTECTED="governance/constitution.md governance/identity.md governance/normative_hierarchy.md"
          WORKFLOW_PATH=".github/workflows/"
          CHANGED="${{ steps.changed.outputs.all_changed_files }}"
          ACTOR="${{ github.actor }}"
          LABELS="${{ github.event.pull_request.labels.*.name }}"
          FAIL=false

          for p in $PROTECTED; do
            if echo "$CHANGED" | grep -E "$p"; then
              FAIL=true
            fi
          done

          if echo "$CHANGED" | grep -Fq "$WORKFLOW_PATH"; then
            if [ "$ACTOR" = "adavydov" ] || [[ "$LABELS" =~ "allow-workflows" ]]; then
              echo "Workflow changes allowed for sovereign actor/label override."
            else
              echo "Workflow files are protected. Only adavydov or PRs with 'allow-workflows' label may change them."
              exit 1
            fi
          fi

          if [ "$FAIL" = true ]; then
            if [[ "$LABELS" =~ "l0-approved" ]]; then
              echo "L0 override label found. Allowing."
            else
              echo "Protected files changed. Add label 'l0-approved' to merge."
              exit 1
            fi
          fi
