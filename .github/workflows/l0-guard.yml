name: L0 Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  l0-guard:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Check for protected L0 files via GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const protectedFiles = new Set([
              'governance/constitution.md',
              'governance/identity.md',
              'governance/normative_hierarchy.md',
            ]);

            const labels = (context.payload.pull_request?.labels ?? []).map((label) => label.name);
            const hasOverride = labels.includes('l0-approved');

            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const touchedL0 = changedFiles
              .map((file) => file.filename)
              .filter((filename) => protectedFiles.has(filename));

            if (touchedL0.length === 0) {
              core.info('No L0 files changed.');
              return;
            }

            core.warning(`Touched L0 files: ${touchedL0.join(', ')}`);

            if (hasOverride) {
              core.info("L0 override label 'l0-approved' found. Allowing.");
              return;
            }

            core.setFailed("Protected L0 files changed. Add label 'l0-approved' to merge.");
