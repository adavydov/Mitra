name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  scope-check:
    name: ci/scope-check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/ci/check_declared_scope.py
        env:
          SCOPE_CHECK_MODE: ${{ vars.SCOPE_CHECK_MODE || 'auto' }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

  lint:
    name: ci/lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m compileall -q mitra_app
      - run: echo "lint placeholder"

  smoke:
    name: ci/smoke
    runs-on: ubuntu-latest
    needs: [scope-check, lint]
    env:
      TELEGRAM_BOT_TOKEN: dummy
      TELEGRAM_WEBHOOK_SECRET: dummy
      PUBLIC_BASE_URL: https://example.com
      ALLOWED_TELEGRAM_USER_IDS: "134988885"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m py_compile mitra_app/*.py
      - run: python -c "import mitra_app.main; print('IMPORT_OK')"
      - run: pytest -q tests/test_import_smoke.py

  tests-full:
    name: ci/tests-full
    runs-on: ubuntu-latest
    needs: [smoke]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-tests'))
    env:
      TELEGRAM_BOT_TOKEN: dummy
      TELEGRAM_WEBHOOK_SECRET: dummy
      PUBLIC_BASE_URL: https://example.com
      ALLOWED_TELEGRAM_USER_IDS: "134988885"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - run: pytest -q
