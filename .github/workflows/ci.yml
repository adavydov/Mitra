name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: ci/lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 scripts/lint_ids/lint_ids.py

  config-validate:
    name: ci/config-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 scripts/validate_config/validate_config.py

  tests:
    name: ci/tests
    runs-on: ubuntu-latest
    needs: [lint, config-validate]
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/evals/regression.sh
