name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-ids:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 scripts/lint_ids/lint_ids.py

  schema-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 scripts/validate_config/validate_config.py

  evals-security:
    runs-on: ubuntu-latest
    needs: [lint-ids, schema-config]
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/evals/security.sh

  evals-finance:
    runs-on: ubuntu-latest
    needs: [lint-ids, schema-config]
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/evals/finance.sh

  evals-privacy:
    runs-on: ubuntu-latest
    needs: [lint-ids, schema-config]
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/evals/privacy.sh

  evals-scheduling:
    runs-on: ubuntu-latest
    needs: [lint-ids, schema-config]
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/evals/scheduling.sh

  evals-regression:
    runs-on: ubuntu-latest
    needs: [evals-security, evals-finance, evals-privacy, evals-scheduling]
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/evals/regression.sh
