name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint_ids:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 scripts/lint_ids.py

  validate_config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 scripts/validate_config.py

  pytest:
    runs-on: ubuntu-latest
    needs: [lint_ids, validate_config]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest -q
