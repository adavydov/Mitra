name: Conditional Auto-Merge

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]

concurrency:
  group: conditional-automerge-pr-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  conditional-automerge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Evaluate auto-merge eligibility
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const prs = run?.pull_requests ?? [];
            const pr = prs[0];

            if (!pr) {
              core.info('No pull request is associated with this CI run. Skipping auto-merge enablement.');
              core.setOutput('eligible', 'false');
              return;
            }

            const isCodexBranch = (run?.head_branch ?? '').startsWith('codex/');
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('eligible', String(isCodexBranch));

            if (!isCodexBranch) {
              core.info("PR head branch does not match 'codex/*'. Skipping auto-merge enablement.");
              return;
            }

            core.info(`CI succeeded for codex branch '${run.head_branch}' on PR #${pr.number}. Enabling auto-merge.`);

      - name: Enable auto-merge for eligible PR
        if: steps.gate.outputs.eligible == 'true'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.gate.outputs.pr_number }}
          merge-method: merge
