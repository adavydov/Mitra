name: Mitra label -> Codex

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  mitra-label-to-codex:
    if: github.event.label.name == 'mitra:codex'
    runs-on: ubuntu-latest
    steps:
      - name: Post Codex task comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labeler = context.payload.sender?.login || 'unknown';
            const body = [
              '@codex',
              '',
              `Please pick up issue #${issue.number}: ${issue.title}`,
              '',
              `Source: ${issue.html_url}`,
              `Triggered by label: \`${context.payload.label?.name || 'unknown'}\` by @${labeler}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body,
            });
